name: Regression Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # 03:30 Taiwan time daily (UTC 19:30), after the site's 02:00 data refresh.
    - cron: "30 19 * * *"
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest

    env:
      # Tests run against the live, publicly deployed application.
      BASE_URL: https://dragondaddy2021.github.io/oddlot
      SUPABASE_URL: https://mmcoqujhhrltdaozfkwj.supabase.co
      # Publishable (anon) key is embedded in the public site. Override with a
      # repository secret if it is ever rotated.
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'sb_publishable_r3aGW9I-7L88V_4cAD-RzQ_BajY_hDU' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Java (required by Allure CLI)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Install Allure commandline
        run: npm install -g allure-commandline

      - name: Create report directory
        run: mkdir -p reports

      - name: Run API and Web regression tests
        run: pytest tests/api tests/web --html=reports/report.html --self-contained-html --alluredir=reports/allure-results --junitxml=reports/junit.xml

      - name: Generate Allure report
        if: always()
        run: allure generate reports/allure-results -o reports/allure-report --clean

      - name: Build email summary
        if: always()
        id: summary
        run: python scripts/ci_summary.py

      - name: Upload pytest-html report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-html-report
          path: reports/report.html
          if-no-files-found: error

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report
          path: reports/allure-report
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results
          path: reports/allure-results
          if-no-files-found: ignore

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: failure-screenshots
          path: reports/screenshots/*.png
          if-no-files-found: ignore

      # Daily report email — sent only on the scheduled run and on manual dispatch
      # (not on every push/PR, to avoid noise). Never fails the build.
      - name: Email daily report
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        continue-on-error: true
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: OddLot QA CI <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          subject: "OddLot QA 回歸 [${{ steps.summary.outputs.status }}] — ${{ steps.summary.outputs.passed }}/${{ steps.summary.outputs.total }} 通過"
          # Rich per-test breakdown shown inline (built by scripts/ci_summary.py).
          html_body: file://reports/email_body.html
          # Plain-text fallback for clients that don't render HTML.
          body: |
            OddLot QA Automation — 每日回歸報告
            結果 ${{ steps.summary.outputs.status }} | 通過 ${{ steps.summary.outputs.passed }} / ${{ steps.summary.outputs.total }} | 失敗 ${{ steps.summary.outputs.failed }} | 略過 ${{ steps.summary.outputs.skipped }}
            完整執行紀錄：${{ steps.summary.outputs.run_url }}
          attachments: reports/report.html
