[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --html=reports/report.html --self-contained-html --alluredir=reports/allure-results --clean-alluredir
markers =
    api: API-level tests
    web: browser-based UI tests
    smoke: critical smoke tests
    ai: AI recommendation behavior tests

